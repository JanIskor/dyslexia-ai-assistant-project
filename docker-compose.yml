services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dyslexia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dyslexia_db
      POSTGRES_USER: dyslexia_user
      POSTGRES_PASSWORD: dyslexia_password
    ports:
      - "5433:5432"
    volumes:
      - dyslexia_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dyslexia_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dyslexia.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: dyslexia_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dyslexia_minio_data:/data

volumes:
  dyslexia_postgres_data:
  dyslexia_minio_data:
